<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            padding: 20px;
        }

        .error-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .error-code {
            font-size: 100px;
            margin: 0;
            color: #1e3c72;
        }

        .error-title {
            font-size: 24px;
            margin: 10px 0;
        }

        .error-text {
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #2a5298;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #1e3c72;
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="error-box">

        <div class="emoji">😵</div>

        <h1 class="error-code">404</h1>

        <h2 class="error-title">Page Not Found</h2>

        <p class="error-text">
            Oops! The page you are looking for does not exist or has been moved.
        </p>

        <a href="/" class="btn">Go Back Home</a>

    </div>

</div>

</body>
</html>
