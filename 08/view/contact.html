<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 40px;
        }

        .header p {
            margin-top: 10px;
            opacity: 0.9;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        .contact-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* FORM */
        .form {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .form h2 {
            margin-bottom: 15px;
            color: #1e3c72;
        }

        .form input,
        .form textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .form textarea {
            resize: none;
            height: 120px;
        }

        .form button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .form button:hover {
            background: #1e3c72;
        }

        /* INFO BOX */
        .info {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .info h2 {
            color: #1e3c72;
        }

        .info p {
            margin: 10px 0;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #2a5298;
            color: white;
            border-radius: 5px;
            font-size: 12px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1e3c72;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Contact Us</h1>
    <p>We would love to hear from you 🚀</p>
</div>

<!-- MAIN -->
<div class="container">

    <div class="contact-box">

        <!-- CONTACT FORM -->
        <div class="form">
            <h2>Send Message</h2>

            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">

                <textarea placeholder="Your Message"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>

        <!-- CONTACT INFO -->
        <div class="info">
            <h2>Get in Touch</h2>

            <p><span class="badge">Email</span> support@example.com</p>
            <p><span class="badge">Phone</span> +251 91 000 0000</p>
            <p><span class="badge">Location</span> Addis Ababa, Ethiopia</p>

            <hr>

            <h3>Working Hours</h3>
            <p>Mon - Fri: 9:00 AM - 6:00 PM</p>
            <p>Sat: 10:00 AM - 2:00 PM</p>
            <p>Sun: Closed</p>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 My Express Project | Contact Page 🚀</p>
</footer>

</body>
</html>
